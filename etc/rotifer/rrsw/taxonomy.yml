# Configuration files for rrsw are YAML files
#
# For details on the syntax see
#  - http://www.yaml.org/
#  - http://en.wikipedia.org/wiki/YAML
#
# Supported keys: include and exclude
# Supported values: strings and Perl regular expressions 
#
# Exclude is processed before include therefore 
# excluded patterns take precedence over included ones
# 

# Don't touch this!
---

# What I want
include:
 - accession2taxid
 - biocollections
 - Ccode_dump.txt
 - coll_dump.txt
 - Cowner_dump.txt
 - Icode_dump.txt
 - Major_taxonomic_updates_2023.txt
 - ncbi_taxonomy_genussp.txt
 - taxcat_readme.txt
 - taxcat.tar.gz
 - taxdump_readme.txt
 - taxdump.tar.gz

# Things I don't want
exclude:
 - .Z
 - .md5
 - .zip
 - /.tmp
 - /new_taxdump
